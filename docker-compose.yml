services:
  # --- Векторная база данных ---
  qdrant:
    image: qdrant/qdrant:latest
    container_name: career_qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_data:/qdrant/storage

  # --- Реляционная база данных (Вакансии и Юзеры) ---
  postgres:
    image: postgres:15
    container_name: career_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_career}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  # --- Airflow (Упрощенная версия для локальной разработки) ---
  airflow:
    image: apache/airflow:2.8.1-python3.11
    container_name: career_airflow
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-password}@postgres/ai_career
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/scripts:/opt/airflow/scripts
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    command: standalone

  # --- Backend (FastAPI) ---
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: career_backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - qdrant

  # --- Frontend (Streamlit) ---
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: career_frontend
    volumes:
      - ./frontend:/app
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - backend
version: "3"

services:

  airflow-init:
    image: apache/airflow:2.9.0
    container_name: airflow-init
    entrypoint: >
      bash -c "airflow db init && airflow users create --username admin --password admin --firstname admin --lastname admin --role Admin --email admin@example.com"
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _PIP_ADDITIONAL_REQUIREMENTS: "pandas requests beautifulsoup4 lxml"
      PYTHONPATH: /opt/airflow/project
    volumes:
      - ./dags:/opt/airflow/dags
      - ./project:/opt/airflow/project
      - ./output_global:/opt/airflow/project/output_global
      - airflow_db:/opt/airflow

  airflow-webserver:
    image: apache/airflow:2.9.0
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _PIP_ADDITIONAL_REQUIREMENTS: "pandas requests beautifulsoup4 lxml"
      PYTHONPATH: /opt/airflow/project
    volumes:
      - ./dags:/opt/airflow/dags
      - ./project:/opt/airflow/project
      - ./output_global:/opt/airflow/project/output_global
      - airflow_db:/opt/airflow

  airflow-scheduler:
    image: apache/airflow:2.9.0
    container_name: airflow-scheduler
    command: scheduler
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _PIP_ADDITIONAL_REQUIREMENTS: "pandas requests beautifulsoup4 lxml"
      PYTHONPATH: /opt/airflow/project
    volumes:
      - ./dags:/opt/airflow/dags
      - ./project:/opt/airflow/project
      - ./output_global:/opt/airflow/project/output_global
      - airflow_db:/opt/airflow

volumes:
  airflow_db: